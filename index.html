
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Road Tracker v0.8</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body,#map{height:100%;margin:0;font-family:Segoe UI,Arial;background:#111}
#panel{
position:absolute;top:14px;left:14px;z-index:1000;
width:340px;padding:16px;border-radius:18px;
background:rgba(20,20,24,.86);
backdrop-filter:blur(12px);
color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.35)}
h2{margin:0 0 12px}
input,select{width:100%;box-sizing:border-box;margin:4px 0 8px;padding:8px;border:none;border-radius:8px}
.row{display:flex;justify-content:space-between;padding:4px 0}
.buttons{display:flex;gap:8px;margin-top:12px}
button{flex:1;padding:11px;border:none;border-radius:10px;color:#fff;font-weight:700}
#start{background:#16a34a}#pause{background:#ca8a04}#stop{background:#dc2626}
.vehicle svg{width:42px;height:42px;transform-origin:center center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
</style>
</head>
<body>
<div id="panel">
<h2>🚗 Road Tracker v0.8</h2>
<label>Survey Name</label>
<input id="survey" placeholder="Road Inspection">
<label>Breadcrumb Spacing</label>
<select id="spacing">
<option>5</option><option selected>10</option><option>20</option><option>50</option>
</select>
<div class="row"><span>Status</span><span id="status">Waiting for GPS…</span></div>
<div class="row"><span>Accuracy</span><span id="acc">--</span></div>
<div class="row"><span>Speed</span><span id="speed">0 km/h</span></div>
<div class="row"><span>Distance</span><span id="dist">0.00 km</span></div>
<div class="buttons">
<button id="start">START</button>
<button id="pause">PAUSE</button>
<button id="stop">STOP</button>
</div>
</div>
<div id="map"></div>
<script>
const map=L.map('map',{zoomControl:false}).setView([-33.8688,151.2093],16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20}).addTo(map);
const icon=L.divIcon({className:'vehicle',iconSize:[42,42],iconAnchor:[21,21],html:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect x="18" y="8" width="28" height="48" rx="10" fill="#fff" stroke="#222" stroke-width="2"/><rect x="22" y="12" width="20" height="10" rx="2" fill="#9fd3ff"/><rect x="22" y="42" width="20" height="10" rx="2" fill="#9fd3ff"/><circle cx="20" cy="18" r="3"/><circle cx="44" cy="18" r="3"/><circle cx="20" cy="46" r="3"/><circle cx="44" cy="46" r="3"/><polygon points="32,3 27,10 37,10" fill="#ff3b30"/></svg>`});
const marker=L.marker([-33.8688,151.2093],{icon}).addTo(map);
const line=L.polyline([],{color:"#16d34a",weight:5,opacity:1}).addTo(map);

let state="idle",track=[],last=null,dist=0,lastDot=0,firstFix=false;
start.onclick=()=>{state="tracking";status.textContent="Tracking";track=[];line.setLatLngs([]);dist=0;last=null;lastDot=0;dist.textContent="0.00 km";}
pause.onclick=()=>{if(state==="tracking"){state="paused";status.textContent="Paused";}}
stop.onclick=()=>{state="stopped";status.textContent="Stopped";}
navigator.geolocation.watchPosition(pos=>{
 const p=[pos.coords.latitude,pos.coords.longitude];
 marker.setLatLng(p);
 if(!firstFix){map.setView(p,19);firstFix=true;status.textContent="GPS Ready";}
 else map.panTo(p,{animate:true,duration:.35});
 acc.textContent=Math.round(pos.coords.accuracy)+" m";
 speed.textContent=((pos.coords.speed||0)*3.6).toFixed(1)+" km/h";
 const s=marker.getElement()?.querySelector("svg");
 if(s&&pos.coords.heading!=null&&!isNaN(pos.coords.heading))s.style.transform="rotate("+pos.coords.heading+"deg)";
 if(state==="tracking"){
   if(last){
     const d=calculateDistance(last[0],last[1],p[0],p[1]);
     if(d>2){
       dist+=d;
       if(dist-lastDot>=parseFloat(spacing.value)){
         L.circleMarker(p,{radius:3,color:"#00ff66",fillColor:"#00ff66",fillOpacity:1}).bindPopup((survey.value||"Survey")+"<br>"+new Date().toLocaleTimeString()).addTo(map);
         lastDot=dist;
       }
     }
   }
   last=p;
   track.push(p);
   line.setLatLngs(track);
   document.getElementById("dist").textContent=(dist/1000).toFixed(2)+" km";
 }
},e=>{status.textContent="GPS Error: "+e.message;},{enableHighAccuracy:true,maximumAge:0,timeout:20000});
</script>

<script src="js/gps.js"></script>

</body>
</html>
